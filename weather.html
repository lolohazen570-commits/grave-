<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <link rel="stylesheet" href="weather-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>Weather Dashboard</h1>
            <p class="subtitle">Real-time weather information</p>
        </header>

        <div class="search-section">
            <input 
                type="text" 
                id="searchInput" 
                class="search-box" 
                placeholder="Search city... (e.g., London, New York)"
                autocomplete="off"
            >
            <button id="searchBtn" class="search-btn">Search</button>
            <button id="locationBtn" class="location-btn">📍 Current Location</button>
        </div>

        <div id="loadingSpinner" class="spinner hidden"></div>

        <div id="errorMessage" class="error-message hidden"></div>

        <div id="weatherContainer" class="weather-container hidden">
            
            <!-- Current Weather -->
            <section class="current-weather">
                <div class="weather-main">
                    <h2 id="cityName"></h2>
                    <p id="weatherDate"></p>
                    <div class="weather-info">
                        <img id="weatherIcon" src="" alt="weather icon" class="weather-icon">
                        <div class="temp-section">
                            <span id="temperature" class="temperature"></span>
                            <span id="weatherDescription" class="description"></span>
                        </div>
                    </div>
                </div>

                <div class="weather-details">
                    <div class="detail-card">
                        <span class="detail-label">Feels Like</span>
                        <span id="feelsLike" class="detail-value"></span>
                    </div>
                    <div class="detail-card">
                        <span class="detail-label">Humidity</span>
                        <span id="humidity" class="detail-value"></span>
                    </div>
                    <div class="detail-card">
                        <span class="detail-label">Wind Speed</span>
                        <span id="windSpeed" class="detail-value"></span>
                    </div>
                    <div class="detail-card">
                        <span class="detail-label">Pressure</span>
                        <span id="pressure" class="detail-value"></span>
                    </div>
                    <div class="detail-card">
                        <span class="detail-label">UV Index</span>
                        <span id="uvIndex" class="detail-value"></span>
                    </div>
                    <div class="detail-card">
                        <span class="detail-label">Visibility</span>
                        <span id="visibility" class="detail-value"></span>
                    </div>
                </div>
            </section>

            <!-- 5-Day Forecast -->
            <section class="forecast-section">
                <h3>5-Day Forecast</h3>
                <div id="forecastContainer" class="forecast-grid"></div>
            </section>

            <!-- Hourly Forecast -->
            <section class="hourly-section">
                <h3>Hourly Forecast</h3>
                <div id="hourlyContainer" class="hourly-grid"></div>
            </section>

        </div>

        <footer class="footer">
            <p>Weather data provided by OpenWeatherMap | Last updated: <span id="lastUpdate">--:--</span></p>
        </footer>
    </div>

    <script src="weather-script.js"></script>
</body>
</html>
